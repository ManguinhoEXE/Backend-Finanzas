# ============================================
# docker-compose.prod.yml — Producción
# Django apuntando a Supabase (PostgreSQL remoto)
# ============================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finanzas_web_prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    networks:
      - finanzas_network

volumes:
  static_volume:

networks:
  finanzas_network:
    driver: bridge

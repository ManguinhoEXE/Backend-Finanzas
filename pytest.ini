[pytest]
# Archivo de configuración de pytest-django
# Define las variables de entorno y configuración para ejecutar tests

# Usar la configuración de Django del proyecto
DJANGO_SETTINGS_MODULE = config.settings

# Buscar archivos de test en el directorio tests/
python_files = tests.py test_*.py *_tests.py

# Buscar clases de test que empiecen con Test
python_classes = Test*

# Buscar funciones de test que empiecen con test_
python_functions = test_*

# Modo verbose para ver más detalles
addopts = -v --tb=short

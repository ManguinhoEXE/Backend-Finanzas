# ============================================
# render.yaml — Render Blueprint
# Despliegue con Docker + Supabase
# ============================================

services:
  - type: web
    name: finanzas-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /admin/
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      # Variables de Supabase (configurar manualmente en Dashboard)
      - key: DB_NAME
        sync: false
      - key: USER
        sync: false
      - key: PASSWORD
        sync: false
      - key: HOST
        sync: false
      - key: PORT
        sync: false
